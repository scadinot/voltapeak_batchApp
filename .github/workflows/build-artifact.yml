name: Build macOS App Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Archive unsigned .app and upload as artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect scheme
        run: |
          default=$(xcodebuild -list -json | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['schemes'][0]")
          if [ -z "$default" ]; then
            echo "::error::No Xcode scheme detected. Share a scheme via Xcode -> Manage Schemes (Shared checkbox) and commit voltapeak_batch.xcodeproj/xcshareddata/xcschemes/."
            exit 1
          fi
          echo "scheme=$default" >> "$GITHUB_ENV"
          echo "Using scheme: $default"

      - name: Archive
        run: |
          xcodebuild archive \
            -project voltapeak_batch.xcodeproj \
            -scheme "$scheme" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/voltapeak_batch.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual

      # `ditto` est utilisé plutôt qu'un `zip` standard pour préserver le bit
      # exécutable et les attributs étendus du bundle .app (Contents/MacOS/...).
      # actions/upload-artifact@v4 effectue son propre zip qui peut altérer
      # ces métadonnées Unix.
      - name: Package .app with ditto
        run: |
          cd build/voltapeak_batch.xcarchive/Products/Applications
          ditto -c -k --keepParent voltapeak_batch.app "$GITHUB_WORKSPACE/voltapeak_batch.zip"

      - name: Upload .app archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.scheme }}-unsigned-${{ github.sha }}
          path: voltapeak_batch.zip
          if-no-files-found: error
